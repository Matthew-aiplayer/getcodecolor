name: Generate Sitemap

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'   # 每天自動更新一次

jobs:
  generate-sitemap:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://get-color-code.com
          include: |
            **/*.html
            **/*.md
          exclude: |
            README.md
            LICENSE
          changefreq: weekly
          priority: 0.8
          lastmod: 'git'
          output-file: sitemap.xml

      - name: Commit and push sitemap.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "Update sitemap.xml" || echo "No changes to sitemap"
          git push
